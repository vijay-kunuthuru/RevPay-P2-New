version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: revpay_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: revpay_pro_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - revpay_network

  backend:
    build: ./revpay
    container_name: revpay_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/revpay_pro_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - mysql
    networks:
      - revpay_network

  frontend:
    build: ./RevPay-P2-Frontend
    container_name: revpay_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - revpay_network

volumes:
  mysql_data:

networks:
  revpay_network: